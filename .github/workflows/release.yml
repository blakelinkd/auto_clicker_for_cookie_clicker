name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: pip install pyinstaller keyboard pyautogui pywin32 PySide6

      - name: Build with PyInstaller
        run: python -m PyInstaller installer/pyinstaller.spec --clean --noconfirm

      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer/installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/installer/CookieClickerAutoClicker_Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}